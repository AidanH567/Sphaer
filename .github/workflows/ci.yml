name: CI

# Runs the unit test suite + typecheck on every push and PR targeting main.
# Solo-dev workflow merges directly to main, so the push trigger is the one
# that matters day-to-day; the PR trigger covers any future review flow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci
