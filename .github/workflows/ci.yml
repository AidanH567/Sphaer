name: CI

# Runs lint + typecheck + unit tests (and a non-blocking expo-doctor health
# check) on every push and PR targeting main.
# Solo-dev workflow merges directly to main, so the push trigger is the one
# that matters day-to-day; the PR trigger covers any future review flow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Blocking. Errors fail the build; pre-existing issues are tuned to
        # warn-level in eslint.config.js so they surface in logs without
        # breaking CI — burn them down over time.
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci

      - name: Expo doctor (non-blocking)
        # `|| true` because basic workflow YAML has no allow-failure knob
        # (continue-on-error exists per-step but still marks the step red);
        # doctor flags version drift we want visible in logs, not gating.
        run: npx expo-doctor || true
